<div class="modal fade" id="quickMatingModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fa-solid fa-heart text-danger"></i> ثبت جفت‌اندازی</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form action="{{ url_for('livestock.add_mating', id=0) }}" method="POST" id="quickMatingForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="modal-body">
          <div class="mb-3">
            <label class="fw-bold mb-1"><i class="fa-solid fa-search text-primary"></i> انتخاب دام ماده</label>
            <div class="sheep-picker" data-gender="ماده" data-target="mating_sheep_id">
              <div class="input-group">
                <input type="text" class="form-control sheep-search-input" placeholder="شماره پلاک را وارد کنید..." autocomplete="off">
                <button class="btn btn-outline-secondary search-btn" type="button"><i class="fa-solid fa-search"></i></button>
                <button class="btn btn-outline-danger clear-btn" type="button" style="display:none"><i class="fa-solid fa-xmark"></i></button>
              </div>
              <input type="hidden" name="sheep_id" class="selected-id">
              <div class="sheep-results mt-2" style="max-height:200px;overflow-y:auto;display:none"></div>
              <div class="selected-display mt-1 text-success fw-bold small" style="display:none"></div>
            </div>
          </div>
          <div id="matingSuggestionBox" class="alert alert-info py-1 px-2 small mb-2" style="display:none"></div>
          <div class="row g-2 mb-3">
            <div class="col-md-4">
              <label class="fw-bold mb-1">تاریخ (شمسی)</label>
              <input type="text" class="form-control jalali-datepicker">
              <input type="hidden" name="mating_date" class="gregorian-hidden-field">
            </div>
            <div class="col-md-4">
              <label class="fw-bold mb-1">نوع تلقیح</label>
              <select name="mating_type" class="form-select">
                <option value="طبیعی">طبیعی</option>
                <option value="تلقیح مصنوعی">تلقیح مصنوعی</option>
                <option value="لاپاراسکوپی">لاپاراسکوپی</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="fw-bold mb-1">قوچ</label>
              <select name="male_id" class="form-select">
                <option value="">انتخاب...</option>
                {% for r in rams %}<option value="{{ r.id }}">{{ r.ear_tag }}</option>{% endfor %}
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-success"><i class="fa-solid fa-check"></i> ثبت</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">انصراف</button>
        </div>
      </form>
    </div>
  </div>
</div>

        </div>
      </form>
    </div>
  </div>
</div>

<script>
var bulkSheep = {};
document.getElementById('bulkSheepSearch').addEventListener('input', function() {
    const q = this.value.trim();
    if (!q || q.length < 1) { document.getElementById('bulkSearchResults').style.display = 'none'; return; }
    fetch('/livestock/api/sheep_search?q=' + encodeURIComponent(q) + '&gender=ماده').then(r => r.json()).then(data => {
        const res = document.getElementById('bulkSearchResults');
        res.innerHTML = '';
        if (!data.length) { res.innerHTML = '<div class="text-muted small p-2">نتیجه‌ای یافت نشد</div>'; res.style.display = 'block'; return; }
        data.forEach(s => {
            if (bulkSheep[s.id]) return;
            const div = document.createElement('div');
            div.className = 'sheep-search-result p-2 d-flex justify-content-between align-items-center border-bottom';
            div.innerHTML = '<span class="fw-bold">' + s.ear_tag + '</span><span class="small text-muted">' + s.breed + ' | ' + s.pen + '</span>';
            div.onclick = function() { addToBulkList(s); };
            res.appendChild(div);
        });
        res.style.display = 'block';
    });
});
document.addEventListener('click', function(e) { if (!document.getElementById('bulkSheepSearch').closest('.input-group').contains(e.target)) document.getElementById('bulkSearchResults').style.display = 'none'; });
document.getElementById('bulkAddBtn').addEventListener('click', function() {
    const q = document.getElementById('bulkSheepSearch').value.trim();
    if (!q) return;
    fetch('/livestock/api/sheep_search?q=' + encodeURIComponent(q) + '&gender=ماده').then(r => r.json()).then(data => {
        if (data.length === 1 && !bulkSheep[data[0].id]) addToBulkList(data[0]);
        else if (data.length > 0) { addToBulkList(data[0]); }
    });
});
function addToBulkList(s) {
    if (bulkSheep[s.id]) return;
    bulkSheep[s.id] = s;
    renderBulkList();
    document.getElementById('bulkSheepSearch').value = '';
    document.getElementById('bulkSearchResults').style.display = 'none';
}
function removeFromBulkList(id) {
    delete bulkSheep[id];
    renderBulkList();
}
function renderBulkList() {
    const list = document.getElementById('bulkSelectedList');
    const ids = Object.keys(bulkSheep);
    if (ids.length === 0) {
        list.innerHTML = '<div class="text-muted small text-center" id="bulkEmptyMsg">هیچ دامی انتخاب نشده است.</div>';
        return;
    }
    let html = '';
    ids.forEach(function(id) {
        const s = bulkSheep[id];
        html += '<div class="d-flex justify-content-between align-items-center border-bottom py-1 px-1"><span class="fw-bold small">' + s.ear_tag + '</span><input type="hidden" name="sheep_ids" value="' + id + '"><button type="button" class="btn btn-sm btn-outline-danger py-0" onclick="removeFromBulkList(' + id + ')"><i class="fa-solid fa-xmark"></i></button></div>';
    });
    list.innerHTML = html;
}
</script>
