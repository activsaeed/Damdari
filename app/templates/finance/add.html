{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>ثبت تراکنش مالی جدید</h2>
    <a href="{{ url_for('finance.index') }}" class="btn btn-secondary shadow-sm">
        <i class="fa-solid fa-arrow-right"></i> بازگشت به دفتر کل
    </a>
</div>

<div class="card shadow-sm border-0 col-lg-8 mx-auto bg-white">
    <div class="card-body p-4">
        <form action="{{ url_for('finance.add_transaction') }}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="row g-3 mb-4 border-bottom pb-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">نوع فاکتور</label>
                    <select name="t_type" id="t_type" class="form-select fw-bold shadow-sm" onchange="updateCategories()">
                        <option value="درآمد">درآمد (فروش/ورود پول)</option>
                        <option value="هزینه" selected>هزینه (خرید/خروج پول)</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">شماره فاکتور مرجع (فیزیکی)</label>
                    <input type="text" name="invoice_number" class="form-control font-monospace border-info" placeholder="شماره درج شده روی برگه فاکتور">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">تاریخ فاکتور (شمسی)</label>
                    <input type="text" name="t_date_jalali" class="form-control jalali-datepicker" required>
                    <input type="hidden" name="t_date" class="gregorian-hidden-field" value="{{ today_str }}">
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-7">
                    <label class="form-label fw-bold text-dark">طرف حساب (مشتری / تامین‌کننده)</label>
                    <select name="contact_id" id="contact_id" class="form-select select2 mb-2 shadow-sm border-info" onchange="togglePartyInput()">
                        <option value="">-- شخص متفرقه یا جدید --</option>
                        {% for c in contacts %}
                        <option value="{{ c.id }}">{{ c.name }} ({{ c.balance|currency }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-5" id="party_name_div">
                    <label class="form-label fw-bold">نام شخص جدید</label>
                    <input type="text" name="party_name" class="form-control" placeholder="نام را اینجا بنویسید...">
                </div>
            </div>
            
            <div class="row g-3 mb-4 bg-light p-3 rounded-3 border">
                <div class="col-md-4">
                    <label class="form-label fw-bold text-primary">روش تسویه فاکتور</label>
                    <select name="payment_method" id="payment_method" class="form-select fw-bold border-primary shadow-sm" onchange="toggleDueDate()">
                        <option value="نقدی">نقدی (برداشت مستقیم از بانک/صندوق)</option>
                        <option value="نسیه">نسیه (ثبت در حساب شخص)</option>
                    </select>
                    <small class="text-muted mt-1 d-block"><i class="fa-solid fa-circle-info"></i> در حالت <b>نقدی</b>، تراز حساب شخص تغییر نمی‌کند.</small>
                </div>
                <div class="col-md-4" id="due_date_div" style="display:none;">
                    <label class="form-label fw-bold text-danger">تاریخ سررسید پرداخت</label>
                    <input type="text" name="due_date_jalali" class="form-control jalali-datepicker border-danger">
                    <input type="hidden" name="due_date" class="gregorian-hidden-field">
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold">مرکز هزینه / واحد مربوطه</label>
                    <select name="cost_center" class="form-select shadow-sm">
                        <option value="">بدون مرکز هزینه</option>
                        <option value="پرواری">بخش پرواری (گوشتی)</option>
                        <option value="داشتی">بخش مولد (میش داشتی)</option>
                        <option value="شیردوشی">واحد شیردوشی و لبنیات</option>
                        <option value="تاسیسات">تعمیرات، ساختمان و تاسیسات</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <label class="form-label fw-bold text-primary">مبلغ پایه (خالص)</label>
                    <input type="text" class="form-control text-center fw-bold text-primary" placeholder="مثال: 5,000,000" onkeyup="calcFinancials(this, 'raw_amount')" required>
                    <input type="hidden" id="raw_amount" name="amount" required>
                    <div class="invalid-feedback">مبلغ باید بیشتر از صفر باشد.</div>
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold">مبلغ تخفیف</label>
                    <input type="text" class="form-control text-center text-danger" onkeyup="calcFinancials(this, 'raw_discount')">
                    <input type="hidden" id="raw_discount" name="discount_amount" value="0">
                </div>
                <div class="col-md-3">
                    <div class="d-flex justify-content-between">
                        <label class="form-label fw-bold text-info">مالیات</label>
                        <a href="javascript:void(0)" id="exempt_btn" class="text-decoration-none small text-danger fw-bold" onclick="toggleTaxExemption()">معاف از مالیات؟</a>
                    </div>
                    <input type="text" id="vat_display" class="form-control text-center text-info" onkeyup="calcFinancials(this, 'raw_vat', true)">
                    <input type="hidden" id="raw_vat" name="vat_amount" value="0">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-bold text-dark">جمع کل فاکتور</label>
                    <input type="text" id="display_total" class="form-control form-control-lg text-center fw-bold bg-light text-dark" readonly>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-12">
                    <label class="form-label fw-bold">نوع کالا یا خدمات (دسته‌بندی)</label>
                    <input list="categoryList" name="category" id="categoryInput" class="form-control border-primary" autocomplete="off" placeholder="مثلاً: خرید ذرت، دستمزد دامپزشک، فروش بره..." required>
                    <datalist id="categoryList"></datalist>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">شرح تراکنش و ملاحظات</label>
                <textarea name="description" class="form-control" rows="2" placeholder="جزئیات این تراکنش را اینجا بنویسید..."></textarea>
            </div>
            
            <div class="mb-4 p-3 bg-light border rounded">
                <label class="form-label fw-bold"><i class="fa-solid fa-images text-secondary"></i> ضمیمه کردن اسناد و فاکتورها</label>
                <input type="file" name="documents" class="form-control mt-2" accept="image/*,.pdf" multiple>
                <small class="text-muted mt-2 d-block">می‌توانید چندین عکس یا فایل PDF را همزمان انتخاب و آپلود کنید.</small>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold"><i class="fa-solid fa-save"></i> ثبت در سیستم حسابداری</button>
            </div>
        </form>
    </div>
</div>

<input type="hidden" id="vat_rate_setting" value="{{ system_settings.vat_rate }}">

<script>
    const incCats = [{% for c in income_cats %}"{{ c.name }}",{% endfor %}];
    const expCats = [{% for c in expense_cats %}"{{ c.name }}",{% endfor %}];

    function updateCategories() {
        const datalist = document.getElementById("categoryList");
        const input = document.getElementById("categoryInput");
        const isIncome = document.getElementById("t_type").value === 'درآمد';
        const categories = isIncome ? incCats : expCats;
        datalist.innerHTML = ""; input.value = "";
        categories.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            datalist.appendChild(option);
        });
    }

    function togglePartyInput() {
        const contactId = document.getElementById('contact_id').value;
        document.getElementById('party_name_div').style.display = contactId ? 'none' : 'block';
    }

    function toggleDueDate() {
        const method = document.getElementById('payment_method').value;
        document.getElementById('due_date_div').style.display = method === 'نسیه' ? 'block' : 'none';
    }

    let isTaxExempt = false;

    function toggleTaxExemption() {
        isTaxExempt = !isTaxExempt;
        const vatInput = document.getElementById('vat_display');
        const btn = document.getElementById('exempt_btn');

        if (isTaxExempt) {
            vatInput.disabled = true;
            btn.innerText = "لغو معافیت";
            btn.classList.replace('text-danger', 'text-success');
        } else {
            vatInput.disabled = false;
            btn.innerText = "معاف از مالیات؟";
            btn.classList.replace('text-success', 'text-danger');
        }
        calcFinancials(null, null);
    }

    function calcFinancials(input, hiddenId, isManualVat = false) {
        // ۱. بروزرسانی فیلد مخفی و فرمت کردن عدد ورودی
        if (input && hiddenId) {
            let cleanVal = input.value.replace(/\D/g, "");
            if (hiddenId === 'raw_amount' && cleanVal === '0') {
                input.classList.add('is-invalid');
            } else if (hiddenId === 'raw_amount') {
                input.classList.remove('is-invalid');
            }
            document.getElementById(hiddenId).value = cleanVal;
            input.value = cleanVal ? Number(cleanVal).toLocaleString('en-US') : "";
        }

        const vatRate = parseFloat(document.getElementById('vat_rate_setting').value) || 0;
        // دریافت مقادیر عددی واقعی از فیلدهای مخفی برای محاسبات دقیق
        const base = parseInt(document.getElementById('raw_amount').value) || 0;
        const disc = parseInt(document.getElementById('raw_discount').value) || 0;
        const netAmount = base - disc;
        
        let vatAmount = 0;
        if (isTaxExempt) {
            vatAmount = 0;
            document.getElementById('raw_vat').value = 0;
            document.getElementById('vat_display').value = 0;
        } else if (isManualVat) {
            // اگر کاربر مالیات را دستی تغییر داد (مثلا برای کالاهای خاص)
            vatAmount = parseInt(document.getElementById('raw_vat').value) || 0;
        } else {
            // محاسبه خودکار مالیات بر اساس نرخ سیستمی
            vatAmount = Math.round(netAmount * (vatRate / 100));
            document.getElementById('raw_vat').value = vatAmount;
            document.getElementById('vat_display').value = vatAmount.toLocaleString('en-US');
        }

        // ۲. محاسبه نهایی و نمایش در فیلد "جمع کل فاکتور"
        const finalTotal = netAmount + vatAmount;
        document.getElementById('display_total').value = Math.round(finalTotal).toLocaleString('en-US');
    }

    window.onload = function() {
        updateCategories();
        togglePartyInput();
        toggleDueDate();
    };
</script>
{% endblock %}
